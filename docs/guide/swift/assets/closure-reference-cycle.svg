<svg xmlns="http://www.w3.org/2000/svg" width="1427" height="760" viewBox="0 0 1427 760" role="img" aria-labelledby="memory-diagram-title memory-diagram-desc">
  <title id="memory-diagram-title">저장 클로저와 self의 강한 참조 순환</title>
  <desc id="memory-diagram-desc">스택의 외부 변수가 nil인 뒤에도 힙의 ProfileHeaderViewModel이 makeTitle 클로저를 강하게 참조하고, 클로저가 self를 강하게 캡처해 ViewModel을 다시 참조하는 순환을 보여 준다.</desc>
  <defs>
    <marker id="arrow-strong" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#1473e6" />
    </marker>
    <marker id="arrow-weak" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#7c3aed" />
    </marker>
    <marker id="arrow-layout" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 9 5 L 0.5 9.25 z" fill="#94a3b8" />
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
      .diagram-title { font-size: 30px; font-weight: 760; fill: #0b1220; letter-spacing: -0.5px; }
      .diagram-subtitle { font-size: 16px; font-weight: 500; fill: #526071; }
      .memory-title { font-size: 22px; font-weight: 760; fill: #111827; }
      .column-title { font-size: 19px; font-weight: 720; fill: #111827; }
      .node-title { font-size: 16px; font-weight: 720; fill: #111827; }
      .node-title.mono, .row-value.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .row-label { font-size: 14px; font-weight: 600; fill: #64748b; }
      .row-value { font-size: 14px; font-weight: 650; fill: #1f2937; }
      .node-footer { font-size: 13px; font-weight: 560; fill: #64748b; }
      .legend { font-size: 13px; font-weight: 650; fill: #526071; }
      .connector-label { font-size: 13px; font-weight: 720; }
      .strong-text { fill: #1473e6; }
      .weak-text { fill: #7c3aed; }
      .danger-text { fill: #dc2626; }
      .safe-text { fill: #16835b; }
      .muted-text { fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1427" height="760" fill="#ffffff" />
  <text x="38" y="42" class="diagram-title">저장 클로저가 self를 잡으면 객체로 돌아오는 고리가 생겨요</text>
  <text x="38" y="70" class="diagram-subtitle">ViewModel은 클로저를 소유하고, 클로저의 캡처 리스트는 ViewModel을 다시 소유해요.</text>
  <g transform="translate(1013 88)" aria-label="화살표 범례">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#1473e6" stroke-width="3" marker-end="url(#arrow-strong)" />
    <text x="43" y="5" class="legend">강한 참조</text>
    <line x1="122" y1="0" x2="156" y2="0" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-weak)" />
    <text x="165" y="5" class="legend">약한 참조</text>
    <line x1="244" y1="0" x2="278" y2="0" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="2 7" marker-end="url(#arrow-layout)" />
    <text x="287" y="5" class="legend">구조 연결</text>
  </g>

  <rect x="38" y="116" width="1351" height="606" rx="28" fill="#fcfcfd" stroke="#111827" stroke-width="2" />
  <text x="713.5" y="154" text-anchor="middle" class="memory-title">메모리 개념도</text>

  <g id="column-code" aria-label="코드">
    <text x="148" y="191" text-anchor="middle" class="column-title">코드</text>
    <rect x="58" y="210" width="180" height="492" rx="18" fill="#eef1f4" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-closure-code">
      <rect x="72" y="385" width="152" height="142" rx="13" fill="#f8fafc" />
      <path d="M 85 385 H 211 Q 224 385 224 398 V 514 Q 224 527 211 527 H 85" fill="none" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6" />
      <path d="M 85 385 Q 72 385 72 398 V 514 Q 72 527 85 527" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="87" y="414" class="node-title mono" style="font-size: 16px;">makeTitle</text>
      
      <line x1="86" y1="432" x2="210" y2="432" stroke="#e2e8f0" />
      <text x="88" y="460" class="row-label" style="font-size: 14px;">캡처</text>
      <text x="208" y="460" text-anchor="end" class="row-value danger-text" style="font-size: 14px;">self</text>
      <text x="87" y="513" class="node-footer" style="font-size: 13px;">클로저 본문</text>
    </g>
  </g>
  <g id="column-data" aria-label="데이터">
    <text x="337.5" y="191" text-anchor="middle" class="column-title">데이터</text>
    <rect x="250" y="210" width="175" height="492" rx="18" fill="#f7f8fa" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-closure-data">
      <rect x="265" y="400" width="145" height="112" rx="13" fill="#ffffff" />
      <path d="M 278 400 H 397 Q 410 400 410 413 V 499 Q 410 512 397 512 H 278" fill="none" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 278 400 Q 265 400 265 413 V 499 Q 265 512 278 512" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="280" y="429" class="node-title" style="font-size: 16px;">전역·정적 값</text>
      
      <line x1="279" y1="447" x2="396" y2="447" stroke="#e2e8f0" />
      <text x="281" y="475" class="row-label" style="font-size: 14px;">이 예제</text>
      <text x="394" y="475" text-anchor="end" class="row-value muted-text" style="font-size: 14px;">없음</text>
      
    </g>
  </g>
  <g id="column-heap" aria-label="힙">
    <text x="732" y="191" text-anchor="middle" class="column-title">힙</text>
    <rect x="437" y="210" width="590" height="492" rx="18" fill="#ffffff" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-closure-view-model">
      <rect x="511" y="260" width="442" height="152" rx="13" fill="#ffffff" />
      <path d="M 524 260 H 940 Q 953 260 953 273 V 399 Q 953 412 940 412 H 524" fill="none" stroke="#111827" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 524 260 Q 511 260 511 273 V 399 Q 511 412 524 412" fill="none" stroke="#1473e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="526" y="289" class="node-title mono" style="font-size: 16px;">ProfileHeaderViewModel</text>
      <g>
        <rect x="892.36" y="273" width="46.64" height="24" rx="12" fill="#fee2e2" />
        <text x="915.6800000000001" y="290" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #dc2626;">RC 1</text>
      </g>
      <line x1="525" y1="307" x2="939" y2="307" stroke="#e2e8f0" />
      <text x="527" y="335" class="row-label" style="font-size: 14px;">makeTitle</text>
      <text x="937" y="335" text-anchor="end" class="row-value mono strong-text" style="font-size: 14px;">0xC360</text>
      <text x="526" y="398" class="node-footer" style="font-size: 13px;">저장 프로퍼티가 클로저를 소유</text>
    </g>
    <g id="node-stored-closure">
      <rect x="511" y="500" width="442" height="152" rx="13" fill="#faf7ff" />
      <path d="M 524 500 H 940 Q 953 500 953 513 V 639 Q 953 652 940 652 H 524" fill="none" stroke="#6d28d9" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 524 500 Q 511 500 511 513 V 639 Q 511 652 524 652" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="526" y="529" class="node-title" style="font-size: 16px;">makeTitle 저장 클로저</text>
      <g>
        <rect x="892.36" y="513" width="46.64" height="24" rx="12" fill="#fee2e2" />
        <text x="915.6800000000001" y="530" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #dc2626;">RC 1</text>
      </g>
      <line x1="525" y1="547" x2="939" y2="547" stroke="#e2e8f0" />
      <text x="527" y="575" class="row-label" style="font-size: 14px;">capture self</text>
      <text x="937" y="575" text-anchor="end" class="row-value mono strong-text" style="font-size: 14px;">0xA120</text>
      <text x="526" y="638" class="node-footer" style="font-size: 13px;">self를 강하게 캡처</text>
    </g>
  </g>
  <g id="column-stack" aria-label="스택">
    <text x="1204" y="191" text-anchor="middle" class="column-title">스택</text>
    <rect x="1039" y="210" width="330" height="492" rx="18" fill="#f8fafc" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-released-header-owner" opacity="0.76">
      <rect x="1057" y="540" width="294" height="142" rx="13" fill="#f8fafc" />
      <path d="M 1070 540 H 1338 Q 1351 540 1351 553 V 669 Q 1351 682 1338 682 H 1070" fill="none" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6" />
      <path d="M 1070 540 Q 1057 540 1057 553 V 669 Q 1057 682 1070 682" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="1072" y="569" class="node-title" style="font-size: 16px;">외부 변수</text>
      <g>
        <rect x="1281" y="553" width="56" height="24" rx="12" fill="#e2e8f0" />
        <text x="1309" y="570" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #475569;">해제됨</text>
      </g>
      <line x1="1071" y1="587" x2="1337" y2="587" stroke="#e2e8f0" />
      <text x="1073" y="615" class="row-label" style="font-size: 14px;">viewModel</text>
      <text x="1335" y="615" text-anchor="end" class="row-value mono muted-text" style="font-size: 14px;">nil</text>
      <text x="1072" y="668" class="node-footer" style="font-size: 13px;">밖에서는 다시 접근할 수 없음</text>
    </g>
  </g>

  <g aria-label="참조 관계">
    <g>
      <path d="M 639 412 L 639 500" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="492.5" y="440" width="141" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="563" y="456" text-anchor="middle" class="connector-label strong-text">makeTitle 프로퍼티</text>
      </g>
    </g>
    <g>
      <path d="M 829 500 L 829 412" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="847.5" y="440" width="107" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="901" y="456" text-anchor="middle" class="connector-label strong-text">강한 self 캡처</text>
      </g>
    </g>
  </g>
</svg>
