<svg xmlns="http://www.w3.org/2000/svg" width="1382" height="760" viewBox="0 0 1382 760" role="img" aria-labelledby="memory-diagram-title memory-diagram-desc">
  <title id="memory-diagram-title">두 클래스 인스턴스의 강한 참조 순환</title>
  <desc id="memory-diagram-desc">스택의 외부 변수가 nil이 된 뒤에도 힙의 ProfileViewModel과 ProfileCoordinator가 실선 화살표로 서로 강하게 참조해 해제되지 않는 관계를 보여 준다.</desc>
  <defs>
    <marker id="arrow-strong" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#1473e6" />
    </marker>
    <marker id="arrow-weak" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#7c3aed" />
    </marker>
    <marker id="arrow-layout" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 9 5 L 0.5 9.25 z" fill="#94a3b8" />
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
      .diagram-title { font-size: 30px; font-weight: 760; fill: #0b1220; letter-spacing: -0.5px; }
      .diagram-subtitle { font-size: 16px; font-weight: 500; fill: #526071; }
      .memory-title { font-size: 22px; font-weight: 760; fill: #111827; }
      .column-title { font-size: 19px; font-weight: 720; fill: #111827; }
      .node-title { font-size: 16px; font-weight: 720; fill: #111827; }
      .node-title.mono, .row-value.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .row-label { font-size: 14px; font-weight: 600; fill: #64748b; }
      .row-value { font-size: 14px; font-weight: 650; fill: #1f2937; }
      .node-footer { font-size: 13px; font-weight: 560; fill: #64748b; }
      .legend { font-size: 13px; font-weight: 650; fill: #526071; }
      .connector-label { font-size: 13px; font-weight: 720; }
      .strong-text { fill: #1473e6; }
      .weak-text { fill: #7c3aed; }
      .danger-text { fill: #dc2626; }
      .safe-text { fill: #16835b; }
      .muted-text { fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1382" height="760" fill="#ffffff" />
  <text x="38" y="42" class="diagram-title">외부에서 놓아도 객체끼리 붙잡으면 남아 있어요</text>
  <text x="38" y="70" class="diagram-subtitle">두 객체의 강한 참조가 고리를 만들면 각 참조 수가 0이 되지 않아요.</text>
  <g transform="translate(968 88)" aria-label="화살표 범례">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#1473e6" stroke-width="3" marker-end="url(#arrow-strong)" />
    <text x="43" y="5" class="legend">강한 참조</text>
    <line x1="122" y1="0" x2="156" y2="0" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-weak)" />
    <text x="165" y="5" class="legend">약한 참조</text>
    <line x1="244" y1="0" x2="278" y2="0" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="2 7" marker-end="url(#arrow-layout)" />
    <text x="287" y="5" class="legend">구조 연결</text>
  </g>

  <rect x="38" y="116" width="1306" height="606" rx="28" fill="#fcfcfd" stroke="#111827" stroke-width="2" />
  <text x="691" y="154" text-anchor="middle" class="memory-title">메모리 개념도</text>

  <g id="column-code" aria-label="코드">
    <text x="140.5" y="191" text-anchor="middle" class="column-title">코드</text>
    <rect x="58" y="210" width="165" height="492" rx="18" fill="#eef1f4" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-connect-code">
      <rect x="72" y="390" width="137" height="132" rx="13" fill="#f8fafc" />
      <path d="M 85 390 H 196 Q 209 390 209 403 V 509 Q 209 522 196 522 H 85" fill="none" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6" />
      <path d="M 85 390 Q 72 390 72 403 V 509 Q 72 522 85 522" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="87" y="419" class="node-title mono" style="font-size: 16px;">connect()</text>
      
      <line x1="86" y1="437" x2="195" y2="437" stroke="#e2e8f0" />
      <text x="88" y="465" class="row-label" style="font-size: 14px;">대입</text>
      <text x="193" y="465" text-anchor="end" class="row-value" style="font-size: 14px;">서로 연결</text>
      <text x="87" y="508" class="node-footer" style="font-size: 13px;">두 프로퍼티 설정</text>
    </g>
  </g>
  <g id="column-data" aria-label="데이터">
    <text x="322.5" y="191" text-anchor="middle" class="column-title">데이터</text>
    <rect x="235" y="210" width="175" height="492" rx="18" fill="#f7f8fa" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-cycle-data">
      <rect x="250" y="400" width="145" height="112" rx="13" fill="#ffffff" />
      <path d="M 263 400 H 382 Q 395 400 395 413 V 499 Q 395 512 382 512 H 263" fill="none" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 263 400 Q 250 400 250 413 V 499 Q 250 512 263 512" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="265" y="429" class="node-title" style="font-size: 16px;">전역·정적 값</text>
      
      <line x1="264" y1="447" x2="381" y2="447" stroke="#e2e8f0" />
      <text x="266" y="475" class="row-label" style="font-size: 14px;">이 예제</text>
      <text x="379" y="475" text-anchor="end" class="row-value muted-text" style="font-size: 14px;">없음</text>
      
    </g>
  </g>
  <g id="column-heap" aria-label="힙">
    <text x="702" y="191" text-anchor="middle" class="column-title">힙</text>
    <rect x="422" y="210" width="560" height="492" rx="18" fill="#ffffff" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-cycle-view-model">
      <rect x="498" y="280" width="408" height="152" rx="13" fill="#ffffff" />
      <path d="M 511 280 H 893 Q 906 280 906 293 V 419 Q 906 432 893 432 H 511" fill="none" stroke="#111827" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 511 280 Q 498 280 498 293 V 419 Q 498 432 511 432" fill="none" stroke="#1473e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="513" y="309" class="node-title mono" style="font-size: 16px;">ProfileViewModel</text>
      <g>
        <rect x="845.36" y="293" width="46.64" height="24" rx="12" fill="#fee2e2" />
        <text x="868.6800000000001" y="310" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #dc2626;">RC 1</text>
      </g>
      <line x1="512" y1="327" x2="892" y2="327" stroke="#e2e8f0" />
      <text x="514" y="355" class="row-label" style="font-size: 14px;">coordinator</text>
      <text x="890" y="355" text-anchor="end" class="row-value mono strong-text" style="font-size: 14px;">0xB240</text>
      <text x="513" y="418" class="node-footer" style="font-size: 13px;">Coordinator를 강하게 소유</text>
    </g>
    <g id="node-cycle-coordinator">
      <rect x="498" y="480" width="408" height="152" rx="13" fill="#ffffff" />
      <path d="M 511 480 H 893 Q 906 480 906 493 V 619 Q 906 632 893 632 H 511" fill="none" stroke="#111827" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 511 480 Q 498 480 498 493 V 619 Q 498 632 511 632" fill="none" stroke="#1473e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="513" y="509" class="node-title mono" style="font-size: 16px;">ProfileCoordinator</text>
      <g>
        <rect x="845.36" y="493" width="46.64" height="24" rx="12" fill="#fee2e2" />
        <text x="868.6800000000001" y="510" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #dc2626;">RC 1</text>
      </g>
      <line x1="512" y1="527" x2="892" y2="527" stroke="#e2e8f0" />
      <text x="514" y="555" class="row-label" style="font-size: 14px;">viewModel</text>
      <text x="890" y="555" text-anchor="end" class="row-value mono strong-text" style="font-size: 14px;">0xA120</text>
      <text x="513" y="618" class="node-footer" style="font-size: 13px;">ViewModel을 강하게 소유</text>
    </g>
  </g>
  <g id="column-stack" aria-label="스택">
    <text x="1159" y="191" text-anchor="middle" class="column-title">스택</text>
    <rect x="994" y="210" width="330" height="492" rx="18" fill="#f8fafc" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-released-owners" opacity="0.76">
      <rect x="1012" y="506" width="294" height="176" rx="13" fill="#f8fafc" />
      <path d="M 1025 506 H 1293 Q 1306 506 1306 519 V 669 Q 1306 682 1293 682 H 1025" fill="none" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6" />
      <path d="M 1025 506 Q 1012 506 1012 519 V 669 Q 1012 682 1025 682" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="1027" y="535" class="node-title" style="font-size: 16px;">외부 변수</text>
      <g>
        <rect x="1236" y="519" width="56" height="24" rx="12" fill="#e2e8f0" />
        <text x="1264" y="536" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #475569;">해제됨</text>
      </g>
      <line x1="1026" y1="553" x2="1292" y2="553" stroke="#e2e8f0" />
      <text x="1028" y="581" class="row-label" style="font-size: 14px;">viewModel</text>
      <text x="1290" y="581" text-anchor="end" class="row-value mono muted-text" style="font-size: 14px;">nil</text>
      <text x="1028" y="615" class="row-label" style="font-size: 14px;">coordinator</text>
      <text x="1290" y="615" text-anchor="end" class="row-value mono muted-text" style="font-size: 14px;">nil</text>
      <text x="1027" y="668" class="node-footer" style="font-size: 13px;">밖에서는 다시 접근할 수 없음</text>
    </g>
  </g>

  <g aria-label="참조 관계">
    <g>
      <path d="M 616 432 L 616 480" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="500.25" y="440" width="115.5" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="558" y="456" text-anchor="middle" class="connector-label strong-text">coordinator</text>
      </g>
    </g>
    <g>
      <path d="M 788 480 L 788 432" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="792.75" y="440" width="98.5" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="842" y="456" text-anchor="middle" class="connector-label strong-text">viewModel</text>
      </g>
    </g>
  </g>
</svg>
