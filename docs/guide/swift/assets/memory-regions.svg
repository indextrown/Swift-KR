<svg xmlns="http://www.w3.org/2000/svg" width="1312" height="720" viewBox="0 0 1312 720" role="img" aria-labelledby="memory-diagram-title memory-diagram-desc">
  <title id="memory-diagram-title">Swift 앱의 메모리 영역</title>
  <desc id="memory-diagram-desc">코드, 데이터, 힙, 스택 영역을 나누고 스택의 profile 지역 변수가 힙의 Profile 인스턴스를 강하게 참조하는 관계를 실선 화살표로 보여 준다.</desc>
  <defs>
    <marker id="arrow-strong" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#1473e6" />
    </marker>
    <marker id="arrow-weak" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#7c3aed" />
    </marker>
    <marker id="arrow-layout" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 9 5 L 0.5 9.25 z" fill="#94a3b8" />
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
      .diagram-title { font-size: 30px; font-weight: 760; fill: #0b1220; letter-spacing: -0.5px; }
      .diagram-subtitle { font-size: 16px; font-weight: 500; fill: #526071; }
      .memory-title { font-size: 22px; font-weight: 760; fill: #111827; }
      .column-title { font-size: 19px; font-weight: 720; fill: #111827; }
      .node-title { font-size: 16px; font-weight: 720; fill: #111827; }
      .node-title.mono, .row-value.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .row-label { font-size: 14px; font-weight: 600; fill: #64748b; }
      .row-value { font-size: 14px; font-weight: 650; fill: #1f2937; }
      .node-footer { font-size: 13px; font-weight: 560; fill: #64748b; }
      .legend { font-size: 13px; font-weight: 650; fill: #526071; }
      .connector-label { font-size: 13px; font-weight: 720; }
      .strong-text { fill: #1473e6; }
      .weak-text { fill: #7c3aed; }
      .danger-text { fill: #dc2626; }
      .safe-text { fill: #16835b; }
      .muted-text { fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1312" height="720" fill="#ffffff" />
  <text x="38" y="42" class="diagram-title">코드를 실행하면 값마다 머무는 위치가 달라요</text>
  <text x="38" y="70" class="diagram-subtitle">영역은 개념 모델이며, 실제 배치는 컴파일러 최적화에 따라 달라질 수 있어요.</text>
  <g transform="translate(898 88)" aria-label="화살표 범례">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#1473e6" stroke-width="3" marker-end="url(#arrow-strong)" />
    <text x="43" y="5" class="legend">강한 참조</text>
    <line x1="122" y1="0" x2="156" y2="0" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-weak)" />
    <text x="165" y="5" class="legend">약한 참조</text>
    <line x1="244" y1="0" x2="278" y2="0" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="2 7" marker-end="url(#arrow-layout)" />
    <text x="287" y="5" class="legend">구조 연결</text>
  </g>

  <rect x="38" y="116" width="1236" height="566" rx="28" fill="#fcfcfd" stroke="#111827" stroke-width="2" />
  <text x="656" y="154" text-anchor="middle" class="memory-title">메모리 개념도</text>

  <g id="column-code" aria-label="코드">
    <text x="143" y="191" text-anchor="middle" class="column-title">코드</text>
    <rect x="58" y="210" width="170" height="452" rx="18" fill="#eef1f4" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-show-profile-code">
      <rect x="72" y="366" width="142" height="140" rx="13" fill="#f8fafc" />
      <path d="M 85 366 H 201 Q 214 366 214 379 V 493 Q 214 506 201 506 H 85" fill="none" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6" />
      <path d="M 85 366 Q 72 366 72 379 V 493 Q 72 506 85 506" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="87" y="395" class="node-title mono">showProfile()</text>
      
      <line x1="86" y1="413" x2="200" y2="413" stroke="#e2e8f0" />
      <text x="88" y="441" class="row-label">명령</text>
      <text x="198" y="441" text-anchor="end" class="row-value">실행 코드</text>
      <text x="87" y="492" class="node-footer">컴파일된 명령</text>
    </g>
  </g>
  <g id="column-data" aria-label="데이터">
    <text x="335" y="191" text-anchor="middle" class="column-title">데이터</text>
    <rect x="240" y="210" width="190" height="452" rx="18" fill="#f7f8fa" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-launch-count">
      <rect x="255" y="370" width="160" height="132" rx="13" fill="#ffffff" />
      <path d="M 268 370 H 402 Q 415 370 415 383 V 489 Q 415 502 402 502 H 268" fill="none" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 268 370 Q 255 370 255 383 V 489 Q 255 502 268 502" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="270" y="399" class="node-title">전역·정적 값</text>
      
      <line x1="269" y1="417" x2="401" y2="417" stroke="#e2e8f0" />
      <text x="271" y="445" class="row-label">launchCount</text>
      <text x="399" y="445" text-anchor="end" class="row-value">1</text>
      <text x="270" y="488" class="node-footer">앱 실행 동안 유지</text>
    </g>
  </g>
  <g id="column-heap" aria-label="힙">
    <text x="667" y="191" text-anchor="middle" class="column-title">힙</text>
    <rect x="442" y="210" width="450" height="452" rx="18" fill="#ffffff" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-profile-object">
      <rect x="502" y="349" width="330" height="174" rx="13" fill="#ffffff" />
      <path d="M 515 349 H 819 Q 832 349 832 362 V 510 Q 832 523 819 523 H 515" fill="none" stroke="#111827" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 515 349 Q 502 349 502 362 V 510 Q 502 523 515 523" fill="none" stroke="#1473e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="517" y="378" class="node-title">Profile 인스턴스</text>
      <g>
        <rect x="764" y="362" width="54" height="24" rx="12" fill="#dbeafe" />
        <text x="791" y="379" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #1473e6;">RC 1</text>
      </g>
      <line x1="516" y1="396" x2="818" y2="396" stroke="#e2e8f0" />
      <text x="518" y="424" class="row-label">name</text>
      <text x="816" y="424" text-anchor="end" class="row-value">홍길동</text>
      <text x="518" y="458" class="row-label">주소</text>
      <text x="816" y="458" text-anchor="end" class="row-value mono muted-text">0xA120</text>
      <text x="517" y="509" class="node-footer">클래스 인스턴스 저장</text>
    </g>
  </g>
  <g id="column-stack" aria-label="스택">
    <text x="1079" y="191" text-anchor="middle" class="column-title">스택</text>
    <rect x="904" y="210" width="350" height="452" rx="18" fill="#f8fafc" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-show-profile-frame">
      <rect x="924" y="466" width="310" height="176" rx="13" fill="#ffffff" />
      <path d="M 937 466 H 1221 Q 1234 466 1234 479 V 629 Q 1234 642 1221 642 H 937" fill="none" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 937 466 Q 924 466 924 479 V 629 Q 924 642 937 642" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="939" y="495" class="node-title mono">showProfile()</text>
      
      <line x1="938" y1="513" x2="1220" y2="513" stroke="#e2e8f0" />
      <text x="940" y="541" class="row-label">profile</text>
      <text x="1218" y="541" text-anchor="end" class="row-value mono strong-text">0xA120</text>
      <text x="940" y="575" class="row-label">localID</text>
      <text x="1218" y="575" text-anchor="end" class="row-value">42</text>
      <text x="939" y="628" class="node-footer">함수가 끝나면 프레임 제거</text>
    </g>
  </g>

  <g aria-label="참조 관계">
    <g>
      <path d="M 924 544 L 832 435" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="820.25" y="493.5" width="115.5" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="878" y="509.5" text-anchor="middle" class="connector-label strong-text">profile이 소유</text>
      </g>
    </g>
  </g>
</svg>
