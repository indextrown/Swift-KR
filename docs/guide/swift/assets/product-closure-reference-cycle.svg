<svg xmlns="http://www.w3.org/2000/svg" width="1557" height="930" viewBox="0 0 1557 930" role="img" aria-labelledby="memory-diagram-title memory-diagram-desc">
  <title id="memory-diagram-title">ProductViewModel과 저장 클로저 사이의 강한 참조 순환</title>
  <desc id="memory-diagram-desc">스택의 외부 viewModel 변수가 nil인 뒤에도 힙의 ProductViewModel이 ProductLoader를, ProductLoader가 completion 클로저를, 클로저가 self인 ProductViewModel을 각각 강하게 참조해 세 객체가 해제되지 않는 관계를 보여 준다.</desc>
  <defs>
    <marker id="arrow-strong" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#1473e6" />
    </marker>
    <marker id="arrow-weak" markerWidth="11" markerHeight="11" refX="9.5" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 10 5.5 L 0.5 10.25 z" fill="#7c3aed" />
    </marker>
    <marker id="arrow-layout" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0.5 0.75 L 9 5 L 0.5 9.25 z" fill="#94a3b8" />
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
      .diagram-title { font-size: 30px; font-weight: 760; fill: #0b1220; letter-spacing: -0.5px; }
      .diagram-subtitle { font-size: 16px; font-weight: 500; fill: #526071; }
      .memory-title { font-size: 22px; font-weight: 760; fill: #111827; }
      .column-title { font-size: 19px; font-weight: 720; fill: #111827; }
      .node-title { font-size: 16px; font-weight: 720; fill: #111827; }
      .node-title.mono, .row-value.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .row-label { font-size: 14px; font-weight: 600; fill: #64748b; }
      .row-value { font-size: 14px; font-weight: 650; fill: #1f2937; }
      .node-footer { font-size: 13px; font-weight: 560; fill: #64748b; }
      .legend { font-size: 13px; font-weight: 650; fill: #526071; }
      .connector-label { font-size: 13px; font-weight: 720; }
      .strong-text { fill: #1473e6; }
      .weak-text { fill: #7c3aed; }
      .danger-text { fill: #dc2626; }
      .safe-text { fill: #16835b; }
      .muted-text { fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1557" height="930" fill="#ffffff" />
  <text x="38" y="42" class="diagram-title">저장 클로저가 self를 강하게 잡으면 순환이 생겨요</text>
  <text x="38" y="70" class="diagram-subtitle">ProductViewModel → ProductLoader → completion → ProductViewModel이 모두 강한 참조로 이어져요.</text>
  <g transform="translate(1143 88)" aria-label="화살표 범례">
    <line x1="0" y1="0" x2="34" y2="0" stroke="#1473e6" stroke-width="3" marker-end="url(#arrow-strong)" />
    <text x="43" y="5" class="legend">강한 참조</text>
    <line x1="122" y1="0" x2="156" y2="0" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-weak)" />
    <text x="165" y="5" class="legend">약한 참조</text>
    <line x1="244" y1="0" x2="278" y2="0" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="2 7" marker-end="url(#arrow-layout)" />
    <text x="287" y="5" class="legend">구조 연결</text>
  </g>

  <rect x="38" y="116" width="1481" height="776" rx="28" fill="#fcfcfd" stroke="#111827" stroke-width="2" />
  <text x="778.5" y="154" text-anchor="middle" class="memory-title">메모리 개념도</text>

  <g id="column-code" aria-label="코드">
    <text x="153" y="191" text-anchor="middle" class="column-title">코드</text>
    <rect x="58" y="210" width="190" height="662" rx="18" fill="#eef1f4" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-product-cycle-code">
      <rect x="72" y="470" width="162" height="142" rx="13" fill="#f8fafc" />
      <path d="M 85 470 H 221 Q 234 470 234 483 V 599 Q 234 612 221 612 H 85" fill="none" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6" />
      <path d="M 85 470 Q 72 470 72 483 V 599 Q 72 612 85 612" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="87" y="499" class="node-title mono" style="font-size: 16px;">loader.load</text>
      
      <line x1="86" y1="517" x2="220" y2="517" stroke="#e2e8f0" />
      <text x="88" y="545" class="row-label" style="font-size: 14px;">캡처</text>
      <text x="218" y="545" text-anchor="end" class="row-value danger-text" style="font-size: 14px;">self</text>
      <text x="87" y="598" class="node-footer" style="font-size: 13px;">강한 self 캡처</text>
    </g>
  </g>
  <g id="column-data" aria-label="데이터">
    <text x="347.5" y="191" text-anchor="middle" class="column-title">데이터</text>
    <rect x="260" y="210" width="175" height="662" rx="18" fill="#f7f8fa" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-product-cycle-data">
      <rect x="275" y="485" width="145" height="112" rx="13" fill="#ffffff" />
      <path d="M 288 485 H 407 Q 420 485 420 498 V 584 Q 420 597 407 597 H 288" fill="none" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 288 485 Q 275 485 275 498 V 584 Q 275 597 288 597" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="290" y="514" class="node-title" style="font-size: 16px;">전역·정적 값</text>
      
      <line x1="289" y1="532" x2="406" y2="532" stroke="#e2e8f0" />
      <text x="291" y="560" class="row-label" style="font-size: 14px;">이 예제</text>
      <text x="404" y="560" text-anchor="end" class="row-value muted-text" style="font-size: 14px;">없음</text>
      
    </g>
  </g>
  <g id="column-heap" aria-label="힙">
    <text x="797" y="191" text-anchor="middle" class="column-title">힙</text>
    <rect x="447" y="210" width="700" height="662" rx="18" fill="#ffffff" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-product-cycle-view-model">
      <rect x="517" y="267" width="560" height="140" rx="13" fill="#ffffff" />
      <path d="M 530 267 H 1064 Q 1077 267 1077 280 V 394 Q 1077 407 1064 407 H 530" fill="none" stroke="#111827" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 530 267 Q 517 267 517 280 V 394 Q 517 407 530 407" fill="none" stroke="#1473e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="532" y="296" class="node-title mono" style="font-size: 16px;">ProductViewModel</text>
      <g>
        <rect x="1016.36" y="280" width="46.64" height="24" rx="12" fill="#fee2e2" />
        <text x="1039.68" y="297" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #dc2626;">RC 1</text>
      </g>
      <line x1="531" y1="314" x2="1063" y2="314" stroke="#e2e8f0" />
      <text x="533" y="342" class="row-label" style="font-size: 14px;">loader</text>
      <text x="1061" y="342" text-anchor="end" class="row-value mono strong-text" style="font-size: 14px;">0xB240</text>
      <text x="532" y="393" class="node-footer" style="font-size: 13px;">ProductLoader를 강하게 소유</text>
    </g>
    <g id="node-product-cycle-loader">
      <rect x="517" y="471" width="560" height="140" rx="13" fill="#ffffff" />
      <path d="M 530 471 H 1064 Q 1077 471 1077 484 V 598 Q 1077 611 1064 611 H 530" fill="none" stroke="#111827" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 530 471 Q 517 471 517 484 V 598 Q 517 611 530 611" fill="none" stroke="#1473e6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="532" y="500" class="node-title mono" style="font-size: 16px;">ProductLoader</text>
      <g>
        <rect x="1016.36" y="484" width="46.64" height="24" rx="12" fill="#fee2e2" />
        <text x="1039.68" y="501" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #dc2626;">RC 1</text>
      </g>
      <line x1="531" y1="518" x2="1063" y2="518" stroke="#e2e8f0" />
      <text x="533" y="546" class="row-label" style="font-size: 14px;">completion</text>
      <text x="1061" y="546" text-anchor="end" class="row-value mono strong-text" style="font-size: 14px;">0xC360</text>
      <text x="532" y="597" class="node-footer" style="font-size: 13px;">completion 클로저를 강하게 저장</text>
    </g>
    <g id="node-product-cycle-completion">
      <rect x="517" y="675" width="560" height="140" rx="13" fill="#faf7ff" />
      <path d="M 530 675 H 1064 Q 1077 675 1077 688 V 802 Q 1077 815 1064 815 H 530" fill="none" stroke="#6d28d9" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 530 675 Q 517 675 517 688 V 802 Q 517 815 530 815" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="532" y="704" class="node-title" style="font-size: 16px;">completion 저장 클로저</text>
      <g>
        <rect x="1016.36" y="688" width="46.64" height="24" rx="12" fill="#fee2e2" />
        <text x="1039.68" y="705" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #dc2626;">RC 1</text>
      </g>
      <line x1="531" y1="722" x2="1063" y2="722" stroke="#e2e8f0" />
      <text x="533" y="750" class="row-label" style="font-size: 14px;">capture self</text>
      <text x="1061" y="750" text-anchor="end" class="row-value mono strong-text" style="font-size: 14px;">0xA120</text>
      <text x="532" y="801" class="node-footer" style="font-size: 13px;">ProductViewModel을 강하게 캡처</text>
    </g>
  </g>
  <g id="column-stack" aria-label="스택">
    <text x="1329" y="191" text-anchor="middle" class="column-title">스택</text>
    <rect x="1159" y="210" width="340" height="662" rx="18" fill="#f8fafc" stroke="#b8c0cc" stroke-width="1.5" />
    <g id="node-released-product-view-model" opacity="0.76">
      <rect x="1177" y="710" width="304" height="142" rx="13" fill="#f8fafc" />
      <path d="M 1190 710 H 1468 Q 1481 710 1481 723 V 839 Q 1481 852 1468 852 H 1190" fill="none" stroke="#94a3b8" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 6" />
      <path d="M 1190 710 Q 1177 710 1177 723 V 839 Q 1177 852 1190 852" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <text x="1192" y="739" class="node-title" style="font-size: 16px;">외부 변수</text>
      <g>
        <rect x="1411" y="723" width="56" height="24" rx="12" fill="#e2e8f0" />
        <text x="1439" y="740" text-anchor="middle" style="font-size: 12px; font-weight: 760; fill: #475569;">해제됨</text>
      </g>
      <line x1="1191" y1="757" x2="1467" y2="757" stroke="#e2e8f0" />
      <text x="1193" y="785" class="row-label" style="font-size: 14px;">viewModel</text>
      <text x="1465" y="785" text-anchor="end" class="row-value mono muted-text" style="font-size: 14px;">nil</text>
      <text x="1192" y="838" class="node-footer" style="font-size: 13px;">밖에서는 다시 접근할 수 없음</text>
    </g>
  </g>

  <g aria-label="참조 관계">
    <g>
      <path d="M 667 407 L 667 471" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="521.25" y="423" width="115.5" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="579" y="439" text-anchor="middle" class="connector-label strong-text">loader 프로퍼티</text>
      </g>
    </g>
    <g>
      <path d="M 667 611 L 667 675" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="512.75" y="627" width="132.5" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="579" y="643" text-anchor="middle" class="connector-label strong-text">completion 저장</text>
      </g>
    </g>
    <g>
      <path d="M 1077 745 C 1157 745, 1157 337, 1077 337" fill="none" stroke="#1473e6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow-strong)" />
      <g>
        <rect x="1029.5" y="430" width="107" height="23" rx="11.5" fill="#ffffff" stroke="#e2e8f0" />
        <text x="1083" y="446" text-anchor="middle" class="connector-label strong-text">강한 self 캡처</text>
      </g>
    </g>
  </g>
</svg>
