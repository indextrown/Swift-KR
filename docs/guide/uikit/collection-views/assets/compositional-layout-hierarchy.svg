<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" role="img" aria-labelledby="title description">
  <title id="title">Compositional Layout 계층</title>
  <desc id="description">전체 layout 안에 section이 있고 section은 group을 반복한다. 각 group은 두 개의 item을 포함하며 item과 group의 크기는 layout dimension으로 표현한다.</desc>
  <defs>
    <style>
      .title { font-family: "Helvetica Neue", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 32px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: "Helvetica Neue", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 17px; font-weight: 500; fill: #64748b; }
      .level { font-family: "Helvetica Neue", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .caption { font-family: "Helvetica Neue", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #475569; }
      .code { font-family: "SFMono-Regular", Menlo, Monaco, Consolas, monospace; font-size: 15px; font-weight: 700; fill: #075dcc; }
      .tag { font-family: "Helvetica Neue", "Apple SD Gothic Neo", Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #075dcc; }
      .guide { fill: none; stroke: #1675ea; stroke-width: 3; stroke-linecap: round; }
    </style>
    <marker id="arrowhead" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L8 4L0 8Z" fill="#1675ea"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity=".07"/>
    </filter>
  </defs>

  <rect width="1400" height="780" rx="28" fill="#f8fafc"/>
  <text class="title" x="60" y="66">작은 item을 group과 section으로 조합해요</text>
  <text class="subtitle" x="60" y="99">fractional 크기는 직접 부모를 기준으로 계산돼요.</text>

  <g filter="url(#shadow)">
    <rect x="60" y="150" width="970" height="560" rx="28" fill="#fff" stroke="#0f172a" stroke-width="3"/>
    <rect x="60" y="150" width="10" height="560" rx="5" fill="#1675ea"/>
    <text class="level" x="94" y="193">UICollectionViewCompositionalLayout</text>
    <text class="caption" x="94" y="221">전체 section 배치와 주 스크롤 방향</text>

    <rect x="105" y="252" width="880" height="410" rx="24" fill="#eff6ff" stroke="#60a5fa" stroke-width="2"/>
    <text class="level" x="139" y="294">NSCollectionLayoutSection</text>
    <text class="caption" x="139" y="322">group 반복 · section inset · header · 가로 스크롤</text>

    <rect x="145" y="365" width="790" height="230" rx="22" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
    <text class="level" x="178" y="407">NSCollectionLayoutGroup.horizontal</text>
    <text class="caption" x="178" y="435">같은 item을 두 번 반복하는 한 행</text>

    <rect x="188" y="470" width="320" height="90" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <rect x="188" y="470" width="8" height="90" rx="4" fill="#7c3aed"/>
    <text class="level" x="220" y="510">Item 1</text>
    <text class="code" x="220" y="540">fractionalWidth(1)</text>

    <rect x="565" y="470" width="320" height="90" rx="18" fill="#f5f3ff" stroke="#a78bfa" stroke-width="2"/>
    <rect x="565" y="470" width="8" height="90" rx="4" fill="#7c3aed"/>
    <text class="level" x="597" y="510">Item 2</text>
    <text class="code" x="597" y="540">fractionalWidth(1)</text>
  </g>

  <path class="guide" d="M508 515H555" marker-end="url(#arrowhead)"/>
  <rect x="505" y="566" width="376" height="30" rx="15" fill="#e8f3ff"/>
  <text class="tag" x="693" y="586" text-anchor="middle">group이 두 item의 실제 너비를 나눠 계산해요</text>

  <g filter="url(#shadow)">
    <rect x="1090" y="150" width="250" height="250" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="1090" y="150" width="8" height="250" rx="4" fill="#1675ea"/>
    <text class="level" x="1123" y="194">크기 기준</text>
    <text class="code" x="1123" y="238">absolute</text>
    <text class="caption" x="1123" y="262">고정 point</text>
    <text class="code" x="1123" y="305">fractional</text>
    <text class="caption" x="1123" y="329">부모 크기의 비율</text>
    <text class="code" x="1123" y="360">estimated</text>
    <text class="caption" x="1123" y="384">콘텐츠 측정 시작값</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1090" y="450" width="250" height="260" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="1090" y="450" width="8" height="260" rx="4" fill="#7c3aed"/>
    <text class="level" x="1123" y="494">추가 구성</text>
    <text class="caption" x="1123" y="535">• contentInsets</text>
    <text class="caption" x="1123" y="570">• interItemSpacing</text>
    <text class="caption" x="1123" y="605">• supplementaryItems</text>
    <text class="caption" x="1123" y="640">• decorationItems</text>
    <text class="caption" x="1123" y="675">• orthogonalScrolling</text>
  </g>

  <path class="guide" d="M1030 275H1080" marker-end="url(#arrowhead)"/>
  <path class="guide" d="M1030 575H1080" marker-end="url(#arrowhead)"/>
</svg>
